<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="icon" href="images/favicon.ico">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
  	<div class="container">
  		<h1>コンソールにアウトプット</h1>
  		<h2>開発ツールを開く・閉じる</h2>
  	</div>
  </header>
  <main>
  	<div class="container">
  	  <section>
  	    <p id="message"></p>
  	  </section>
  	</div>
  </main>
  <footer>
  	<div class="container">
  	  <p>JavaScript Sample</p>
  	</div>
  </footer>
  
  <script>
    'use strict';
    
    if (window.confirm('20歳以上ですか？')) {
      // true の場合
    	document.getElementById('message').textContent = '飲み過ぎに注意しましょう';
    } else {
      // false の場合
      document.getElementById('message').textContent = 'お酒は二十歳からです';
    }
  </script>
</body>
</html>
