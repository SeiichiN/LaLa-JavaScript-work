<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="icon" href="images/favicon.ico">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
  	<div class="container">
  		<h1>コンソールにアウトプット</h1>
  		<h2>開発ツールを開く・閉じる</h2>
  	</div>
  </header>
  <main>
  	<div class="container">
  	  <section>
  	    <p id="result"></p>
  	  </section>
  	</div>
  </main>
  <footer>
  	<div class="container">
  	  <p>JavaScript Sample</p>
  	</div>
  </footer>
  
  <script>
    'use strict';
    
    let kekka = window.confirm('ゲームスタート！準備はいい？');
    console.log(kekka);
    
    if (kekka) {
      // true の場合
    	document.getElementById('result').textContent = 'ゲームを開始します'
    } else {
      // false の場合
      document.getElementById('result').textContent = 'ゲームを終了します'
    }
  </script>
</body>
</html>
