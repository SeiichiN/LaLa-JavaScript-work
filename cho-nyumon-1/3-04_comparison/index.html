<html lang="ja">

</head>
<body>
  <header>
  	<div class="container">
  		<h1>コンソールにアウトプット</h1>
  		<h2>開発ツールを開く・閉じる</h2>
  	</div>
  </header>
  <main>
  	<div class="container">
  	  <section>
  	  </section>
  	</div>
  </main>
  <footer>
  	<div class="container">
  	  <p>JavaScript Sample</p>
  	</div>
  </footer>
  <script>
    'use strict';
    
    const number 
      = Math.floor(Math.random() * 6);
    const answer = 
      parseInt(window.prompt('数当てゲーム。0～5の数字を入力してね'));
  	
  	let message = '';
  	if (answer === number) {
  	  message = 'あたり！';
  	} else if (answer < 0) {
  	  message = '0～5の数字を入力してね。';
  	} else if (answer > 5) {
  	  message = '0～5の数字を入力してね。';
  	} else if (answer < number) {
  	  message = '残念でした。もっと大きい';
  	} else if (answer > number) {
  	  message = '残念でした。もっと小さい';
  	} else {
  	  message = '0～5の数字を入力してね。';
  	}
  	window.alert(message);
  
  </script>
</body>
