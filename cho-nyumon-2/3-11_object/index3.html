<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="icon" href="images/favicon.ico">
  <link rel="stylesheet" href="css/style.css">
  <style>
    table { border-collapse: collapse; }
    th, td { border: solid 1px #444; padding: 5px 8px; }
    #price::after {
      content: " 円";
    }
  </style>
</head>
<body>
  <header>
  	<div class="container">
  		<h1>コンソールにアウトプット</h1>
  		<h2>開発ツールを開く・閉じる</h2>
  	</div>
  </header>
  <main>
  	<div class="container">
  	  <section>
  	    <table id="table">
          <tr>
            <th>タイトル</th>
            <th>値段</th>
            <th>在庫</th>
          </tr>
  	    </table>
  	  </section>
  	</div>
  </main>
  <footer>
  	<div class="container">
  	  <p>JavaScript Sample</p>
  	</div>
  </footer>
  <script>
    'use strict';

   let books = [];

	 let title = prompt('本のタイトル');
	 let price = parseInt(prompt('値段'));
	 let stock = parseInt(prompt('冊数'));
     books.push({titie: title, price: price, stock: stock});

	 title = prompt('本のタイトル');
	 price = parseInt(prompt('値段'));
	 stock = parseInt(prompt('冊数'));
     books.push({titie: title, price: price, stock: stock});

    
    for (let book of books) {
      console.log(book);
      let ele = '<tr>';
      for (let p in book) {
        ele += `<td class="${p}">${book[p]}</td>`;
      }
      ele += '</tr>';
      document.getElementById('table')
              .insertAdjacentHTML('beforeend', ele);
    }
    

  </script>
</body>
</html>
