    <script>
    'use strict';

     // 同じオブジェクトを配列に入れられるかどうか。
     {
       let animal = [];
       let dog = { name: 'ポチ' };
       animal.push(dog);
       animal.push(dog);
       console.log(animal);
     }

     // 追加したオブジェクトの中身を変更
     {
       let animal = [];
       let dog = {};
       dog.name = 'ポチ';
       animal.push(dog);
       dog.name = 'シロ';
       animal.push(dog);
       console.log(animal);
     }
     
    </script>
