<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="icon" href="images/favicon.ico">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <header>
    <div class="container">
      <h1>コンソールにアウトプット</h1>
      <h2>開発ツールを開く・閉じる</h2>
    </div>
  </header>
  <main>
    <div class="container">
      <section>
        <h1 id="h1-text">やることリスト</h1>
        <ul id="list"></ul>
        <div id="animal">
          <p>馬</p>
        </div>
      </section>
    </div>
  </main>
  <footer>
    <div class="container">
      <p>JavaScript Sample</p>
    </div>
  </footer>
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  <script>
    'use strict';

    $(function () {
      let todo = [
        'デザインカンプ作成',
        'データ整理',
        '勉強会申し込み',
        '牛乳買う',
      ];
      todo.push('歯医者に行く');

      for (const item of todo) {
        const li = `<li>${item}</li>`;
        $('#list').append(li);
      }

      $('#h1-text').css('color', 'orange');

      $('#animal').html(
              `<ol>
                 <li>にわとり</li>
                 <li>カラス</li>
              </ol>`);

    });  // jquery end

  </script>
</body>

</html>
