<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <h1>おみくじ</h1>
	<script>
	  'use strict';
	  
	  let number = 1 + Math.floor(Math.random() * 5);
	  let message;
	  if (number === 1) {
	    message = '大吉';
	  } else if (number === 2) {
	    message = '中吉';
	  } else if (number === 3) {
	    message = '小吉';
	  } else if (number === 4) {
	    message = '末吉';
	  } else {
	    message = '凶';
	  }
	  alert(message);
	</script>
</body>
</html>
