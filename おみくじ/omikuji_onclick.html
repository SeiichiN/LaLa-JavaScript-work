<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    #btn {
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>おみくじ</h1>

  <button id="btn">おみくじをひく</button>

  <hr>
  <p id="fortune"></p>
	<script>
	  'use strict';
	  
	  let kuji = ['大吉', '中吉', '小吉', '末吉', '凶'];

	  document.getElementById('btn').onclick = function() {
	    let number = Math.floor(Math.random() * 5);
	    document.getElementById('fortune')
	            .textContent = kuji[number];
    }

	</script>
</body>
</html>
